<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- fundo escuro idêntico ao dark mode do app -->
  <rect width="32" height="32" rx="8" fill="#0d1117"/>

  <!-- glow indigo sutil (espelha o radial-gradient do body) -->
  <rect width="32" height="32" rx="8" fill="url(#glow)"/>

  <!-- borda interna igual às cards glassmorphism -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="7.25"
        fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- iniciais com gradiente índigo → violeta -->
  <text
    x="16"
    y="16"
    font-family="Inter, Arial, sans-serif"
    font-size="13"
    font-weight="800"
    fill="url(#text-grad)"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-0.5"
  >VM</text>
</svg>
